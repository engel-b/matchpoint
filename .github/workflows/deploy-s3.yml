name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Deploy dist to S3
        run: aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        if: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Create build artifact
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist
          zip -r ../matchpoint-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Matchpoint ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: matchpoint-${{ github.ref_name }}.zip