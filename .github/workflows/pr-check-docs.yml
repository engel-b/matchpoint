name: Check Docs

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/build-deploy-docs.yml"
      - ".github/workflows/pr-check-docs.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  check-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build docs
        run: npm run docs:build
