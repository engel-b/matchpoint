name: Check App

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "README.md"
      - ".github/workflows/build-deploy-docs.yml"
      - ".github/workflows/pr-check-docs.yml"

jobs:
  check-app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
